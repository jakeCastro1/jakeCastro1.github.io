<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3c5e;
            --accent: #e8a838;
        }
        body {
            background: #f5f7fa;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 20%, #d6e4f5 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, #fdefc7 0%, transparent 50%);
        }
        .welcome-card {
            background: white;
            border-radius: 18px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 4px 32px rgba(26,60,94,0.12);
            border: 1px solid #d6dde8;
            max-width: 480px;
            width: 100%;
        }
        .welcome-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'DM Serif Display', serif;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 12px;
        }
        p {
            color: #6c7a8d;
            font-size: 1rem;
            font-weight: 300;
        }
        .accent-line {
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            width: 60px;
            margin: 20px auto;
        }
        .btn-back {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 11px 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            margin-top: 24px;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-back:hover {
            background: #25527e;
            color: white;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
<div class="welcome-card">
    <div class="welcome-icon">🎉</div>
    <h1>You're all set!</h1>
    <div class="accent-line"></div>
    <p>Your account has been created successfully.<br>Welcome aboard!</p>
    <a href="index.html" class="btn-back">← Back to Sign Up</a>
</div>
</body>
</html>
