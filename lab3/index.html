<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Page</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a3c5e;
      --accent: #e8a838;
      --light-bg: #f5f7fa;
      --card-bg: #ffffff;
      --border: #d6dde8;
      --text: #1e2a38;
      --muted: #6c7a8d;
    }

    body {
      background: var(--light-bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background-image: radial-gradient(circle at 20% 20%, #d6e4f5 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #fdefc7 0%, transparent 50%);
    }

    .page-wrapper {
      max-width: 620px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.6rem;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .brand-header p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .form-card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 40px 44px;
      box-shadow: 0 4px 32px rgba(26, 60, 94, 0.10);
      border: 1px solid var(--border);
    }

    .accent-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 18px 18px 0 0;
      margin: -40px -44px 36px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 28px 0 14px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .field-row {
      margin-bottom: 14px;
    }

    .form-label {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
      display: block;
    }

    .form-control,
    .form-select {
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--light-bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26, 60, 94, 0.10);
      background: #fff;
      outline: none;
    }

    .form-control::placeholder {
      color: #b0bac8;
    }

    .gender-row {
      display: flex;
      gap: 20px;
      margin-top: 4px;
    }

    .gender-option {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .gender-option input[type="radio"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
    }

    .inline-feedback {
      font-size: 0.82rem;
      font-weight: 500;
      margin-top: 4px;
      display: block;
      min-height: 18px;
    }

    .btn-signup {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 0;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      width: 100%;
      margin-top: 28px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 3px 12px rgba(26, 60, 94, 0.18);
      cursor: pointer;
    }

    .location-value {
      display: inline-block;
      background: #eef2f8;
      color: var(--primary);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.9rem;
      font-weight: 500;
      min-width: 60px;
    }

    .location-value:empty {
      display: none;
    }

    .btn-signup:hover {
      background: #25527e;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(26, 60, 94, 0.22);
      color: #fff;
    }

    @media (max-width: 600px) {
      .form-card {
        padding: 28px 20px;
      }

      .accent-bar {
        margin: -28px -20px 28px;
      }
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="brand-header">
    <h1>Sign Up</h1>
    <p>Fill in the details below to get started.</p>
  </div>

  <div class="form-card">
    <div class="accent-bar"></div>

    <form id="signupForm" action="welcome.html">

      <div class="section-label">Personal Information</div>

      <div class="field-row">
        <label class="form-label" for="fName">First Name</label>
        <input type="text" class="form-control" id="fName" name="fName">
      </div>

      <div class="field-row">
        <label class="form-label" for="lName">Last Name</label>
        <input type="text" class="form-control" id="lName" name="lName">
      </div>

      <div class="field-row">
        <label class="form-label">Gender</label>
        <div class="gender-row">
          <label class="gender-option">
            <input type="radio" name="gender" value="m"> Male
          </label>
          <label class="gender-option">
            <input type="radio" name="gender" value="f"> Female
          </label>
        </div>
      </div>

      <div class="section-label">Location</div>

      <div class="field-row">
        <label class="form-label" for="zip">Zip Code</label>
        <input type="text" class="form-control" id="zip" name="zip" style="max-width: 200px;">
        <span id="zipError" class="inline-feedback"></span>
      </div>

      <div class="field-row">
        <label class="form-label">City</label>
        <span id="city" class="location-value"></span>
      </div>

      <div class="field-row">
        <label class="form-label">Latitude</label>
        <span id="latitude" class="location-value"></span>
      </div>

      <div class="field-row">
        <label class="form-label">Longitude</label>
        <span id="longitude" class="location-value"></span>
      </div>

      <div class="field-row">
        <label class="form-label" for="state">State</label>
        <select id="state" name="state" class="form-select">
          <option value="">Select One</option>
        </select>
      </div>

      <div class="field-row">
        <label class="form-label" for="county">Select a County</label>
        <select id="county" name="county" class="form-select">
          <option value="">Select County</option>
        </select>
      </div>

      <div class="section-label">Account Details</div>

      <div class="field-row">
        <label class="form-label" for="username">Desired Username</label>
        <input type="text" class="form-control" id="username" name="username">
        <span id="usernameError" class="inline-feedback"></span>
      </div>

      <div class="field-row">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password">
        <span id="suggestedPwd" class="inline-feedback"></span>
      </div>

      <div class="field-row">
        <label class="form-label" for="confirmPassword">Type Password Again</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword">
      </div>

      <span id="passwordError" class="inline-feedback"></span>

      <button type="submit" class="btn-signup">Sign Up →</button>
    </form>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
